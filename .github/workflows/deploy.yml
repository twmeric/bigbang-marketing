name: Build Project

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        working-directory: my-app
        run: |
          npm install
          npm run fetch-cms
          npm run build
        env:
          NEXT_PUBLIC_CMS_API_URL: ${{ secrets.CMS_API_URL }}

      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: my-app/dist
